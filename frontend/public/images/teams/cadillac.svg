<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Cadillac Crest/Shield Logo -->
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#C4A747"/>
      <stop offset="100%" stop-color="#AA8C2C"/>
    </linearGradient>
  </defs>
  <!-- Shield outline -->
  <path d="M100 15 L155 45 L155 120 Q155 165 100 185 Q45 165 45 120 L45 45 Z" 
        fill="url(#goldGrad)" stroke="#8B7D3C" stroke-width="3"/>
  <!-- Inner shield -->
  <path d="M100 30 L143 55 L143 115 Q143 152 100 170 Q57 152 57 115 L57 55 Z" 
        fill="#1a1a2e"/>
  <!-- Cross dividers -->
  <line x1="100" y1="35" x2="100" y2="170" stroke="#C4A747" stroke-width="2.5"/>
  <line x1="60" y1="100" x2="140" y2="100" stroke="#C4A747" stroke-width="2.5"/>
  <!-- Quadrant decorations -->
  <rect x="72" y="58" width="18" height="32" rx="2" fill="#C4A747" opacity="0.8"/>
  <rect x="110" y="58" width="18" height="32" rx="2" fill="#E8002D" opacity="0.8"/>
  <rect x="72" y="108" width="18" height="32" rx="2" fill="#2563EB" opacity="0.8"/>
  <rect x="110" y="108" width="18" height="32" rx="2" fill="#C4A747" opacity="0.8"/>
  <!-- Crown/wreath hints at top -->
  <path d="M85 20 L100 10 L115 20" fill="none" stroke="#C4A747" stroke-width="2"/>
</svg>
